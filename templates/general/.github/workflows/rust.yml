name: Rust

on:
  push:
    branches: [main]
    tags:
      - "*"
    paths:
      - "src/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
  workflow_dispatch:

{% if build_with_pgo %}
env:
  build-with-pgo: {% if build_with_pgo %}true{% else %}false{% endif %}
{%- endif %}

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run formatter check
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
        uses: actions-rust-lang/rustfmt@v1
        with:
          manifest-path: src/Cargo.toml

  semver-checks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Run semver check
        uses: Reloaded-Project/devops-cargo-semver-checks-action@v1
        with:
          manifest-path: src/Cargo.toml
          feature-group: all-features
          rust-toolchain: stable
          rust-target: x86_64-unknown-linux-gnu

  build-and-test:
    name: {% raw %}${{ matrix.label }}{% endraw %}
    strategy:
      matrix:
        include:
          # Linux
          - { label: "Linux x64", os: ubuntu-latest, target: x86_64-unknown-linux-gnu, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
{%- if xplat %}
          - { label: "Linux x86", os: ubuntu-latest, target: i686-unknown-linux-gnu, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
          - { label: "Linux ARM64", os: ubuntu-latest, target: aarch64-unknown-linux-gnu, use-cross: true{%- if build_with_pgo %}, use-pgo: false{% endif %} }
          - { label: "Linux ARMv7", os: ubuntu-latest, target: armv7-unknown-linux-gnueabihf, use-cross: true{%- if build_with_pgo %}, use-pgo: false{% endif %} }

          # Windows
          - { label: "Windows x64", os: windows-latest, target: x86_64-pc-windows-msvc, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
          - { label: "Windows x86", os: windows-latest, target: i686-pc-windows-msvc, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }

          # macOS
          - { label: "macOS Intel", os: macos-15-intel, target: x86_64-apple-darwin, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
          - { label: "macOS Apple Silicon", os: macos-latest, target: aarch64-apple-darwin, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
{%- if big_endian %}

          # Big Endian
          - { label: "Big Endian 32-bit", os: ubuntu-latest, target: powerpc-unknown-linux-gnu, use-cross: true{%- if build_with_pgo %}, use-pgo: false{% endif %} }
          - { label: "Big Endian 64-bit", os: ubuntu-latest, target: powerpc64-unknown-linux-gnu, use-cross: true{%- if build_with_pgo %}, use-pgo: false{% endif %} }
{%- endif %}
{%- endif %}

    {% raw %}runs-on: ${{ matrix.os }}{% endraw %}

    steps:
      - uses: actions/checkout@v6

{%- if build_c_libs %}

      - name: Build C Libraries and Run Tests
        uses: Reloaded-Project/devops-rust-lightweight-binary@v1
        with:
          artifact-prefix: C-Library
          upload-symbols-separately: false
          target: {% raw %}${{ matrix.target }}{% endraw %}
          use-pgo: {% raw %}${{ matrix.use-pgo && env.build-with-pgo }}{% endraw %}
          use-cross: {% raw %}${{ matrix.use-cross }}{% endraw %}
          features: "c-exports"
          build-library: true
          run-tests-and-coverage: true
          codecov-token: {% raw %}${{ secrets.CODECOV_TOKEN }}{% endraw %}
          rust-project-path: src/{{project-name}}
          workspace-path: src
          pgo-project-path: src/{{project-name}}

{%- else %}

      - name: Run Tests and Upload Coverage
        uses: Reloaded-Project/devops-rust-test-and-coverage@v1
        with:
          rust-project-path: ./src
          upload-coverage: true
          codecov-token: {% raw %}${{ secrets.CODECOV_TOKEN }}{% endraw %}
          target: {% raw %}${{ matrix.target }}{% endraw %}
          use-cross: {% raw %}${{ matrix.use-cross }}{% endraw %}

{%- endif %}
      - name: Check documentation is valid
        working-directory: src
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace --all-features --document-private-items --target {% raw %}${{ matrix.target }}{% endraw %}

      - name: Run linter
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
        working-directory: src
        run: cargo clippy --workspace --all-features --target {% raw %}${{ matrix.target }}{% endraw %} -- -D warnings

{%- if build_cli %}

  build-cli:
    name: {% raw %}${{ matrix.label }}{% endraw %}
    strategy:
      matrix:
        include:
          # Linux
          - { label: "CLI Linux x64", os: ubuntu-latest, target: x86_64-unknown-linux-gnu, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
{%- if xplat %}
          - { label: "CLI Linux x86", os: ubuntu-latest, target: i686-unknown-linux-gnu, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
          - { label: "CLI Linux ARM64", os: ubuntu-latest, target: aarch64-unknown-linux-gnu, use-cross: true{%- if build_with_pgo %}, use-pgo: false{% endif %} }
          - { label: "CLI Linux ARMv7", os: ubuntu-latest, target: armv7-unknown-linux-gnueabihf, use-cross: true{%- if build_with_pgo %}, use-pgo: false{% endif %} }

          # Windows
          - { label: "CLI Windows x64", os: windows-latest, target: x86_64-pc-windows-msvc, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
          - { label: "CLI Windows x86", os: windows-latest, target: i686-pc-windows-msvc, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }

          # macOS
          - { label: "CLI macOS Intel", os: macos-15-intel, target: x86_64-apple-darwin, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
          - { label: "CLI macOS Apple Silicon", os: macos-latest, target: aarch64-apple-darwin, use-cross: false{%- if build_with_pgo %}, use-pgo: true{% endif %} }
{%- if big_endian %}

          # Big Endian
          - { label: "CLI Big Endian 32-bit", os: ubuntu-latest, target: powerpc-unknown-linux-gnu, use-cross: true{%- if build_with_pgo %}, use-pgo: false{% endif %} }
          - { label: "CLI Big Endian 64-bit", os: ubuntu-latest, target: powerpc64-unknown-linux-gnu, use-cross: true{%- if build_with_pgo %}, use-pgo: false{% endif %} }
{%- endif %}
{%- endif %}

    {% raw %}runs-on: ${{ matrix.os }}{% endraw %}

    steps:
      - uses: actions/checkout@v6

      - name: Build CLI Binary
        uses: Reloaded-Project/devops-rust-lightweight-binary@v1
        with:
          target: {% raw %}${{ matrix.target }}{% endraw %}
          use-pgo: {% raw %}${{ matrix.use-pgo && env.build-with-pgo }}{% endraw %}
          use-cross: {% raw %}${{ matrix.use-cross }}{% endraw %}
          build-library: false
          run-tests-and-coverage: false
          rust-project-path: src/cli
          workspace-path: src
          pgo-project-path: src/{{project-name}}
          use-cache: true
{%- endif %}

{%- if wine %}
  test-on-wine:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-gnu, i686-pc-windows-gnu]

    steps:
      - uses: actions/checkout@v6

      # Note: Currently in cross, Wine tests break with debug info.
      # https://github.com/cross-rs/cross/issues/1637#issuecomment-3275459974
      - name: Run Tests and Coverage on WINE
        uses: Reloaded-Project/devops-rust-test-and-coverage@v1
        with:
          rust-project-path: ./src
          upload-coverage: true
          codecov-token: {% raw %}${{ secrets.CODECOV_TOKEN }}{% endraw %}
          target: {% raw %}${{ matrix.target }}{% endraw %}
          use-cross: true
          additional-test-args: --release
{%- endif %}

{%- if build_c_libs %}

  build-c-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Generate C++ bindings
        uses: Reloaded-Project/devops-rust-cbindgen@v1
        with:
          rust-project-path: ./src/{{project-name}}
          config-file: ../../.github/cbindgen_cpp.toml
          output-header-file: bindings_cpp.hpp
          use-cache: 'true'

      - name: Generate C bindings
        uses: Reloaded-Project/devops-rust-cbindgen@v1
        with:
          rust-project-path: ./src/{{project-name}}
          config-file: ../../.github/cbindgen_c.toml
          output-header-file: bindings_c.h
          use-cache: 'false' # Caching already included in Generate C++ bindings action
{%- endif %}

{%- if build_csharp_libs %}

  build-dotnet-library:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build and Package .NET Wrapper
        uses: Reloaded-Project/devops-rust-c-library-to-dotnet@v1
        with:
          csharp-project-path: src/bindings/csharp
{%- endif %}

  publish-crate:
    permissions:
      contents: write

    needs: [format-check,semver-checks,build-and-test{%- if build_cli %},build-cli{%- endif %}{%- if build_c_libs %},build-c-headers{%- endif %}{%- if build_csharp_libs %},build-dotnet-library{%- endif %}{%- if wine %},test-on-wine{%- endif %}]
    # Publish only on tags
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Publish Rust Crate and Artifacts
        uses: Reloaded-Project/devops-publish-action@v3
        with:
          {%- if publish_crate_on_tag %}
          rust-crates-io-token: {% raw %}${{ secrets.CRATES_IO_TOKEN }}{% endraw %}
          {%- endif %}
          {%- if build_csharp_libs %}
          csharp-nuget-api-key: {% raw %}${{ secrets.NUGET_KEY }}{% endraw %}
          {%- endif %}
          {%- if publish_crate_on_tag %}
          rust-cargo-project-paths: src/{{project-name}}
          {%- endif %}
          compression-tool: 7z
          artifact-groups-file: .github/artifact-groups.yml
          changelog-enabled: "true"
          changelog-template: .github/changelog.hbs
          changelog-is-release: {% raw %}${{ startsWith(github.ref, 'refs/tags/') }}{% endraw %}
          changelog-release-tag: {% raw %}${{ github.ref_name }}{% endraw %}
          changelog-override-starting-version: "true"
          changelog-hide-credit: "true"
